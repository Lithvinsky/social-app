# Render.com Blueprint: API (Web) + static frontend
# FIXED: updated API URL
#
# - In Render, set the repo *Root directory* to `social-app` if this lives in a monorepo.
# - Deploy the API first, then set the static site build env (VITE_API_URL)
#   to your public API URL (no trailing slash), and redeploy the static site.
# - Use MongoDB Atlas for MONGO_URI; optional Cloudinary for profile avatars on Render.

version: 1
services:
  - type: web
    name: social-app-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: social-app-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
